<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦Ø𝐓𝐈✦ | Consola</title>

<style>
body {
    background: #010101;
    color: #0f0;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

#backBtn {
    background: #00f2ff;
    color: #000;
    border: none;
    padding: 15px 40px;
    font-size: 1rem;
    border-radius: 12px;
    cursor: pointer;
    margin-bottom: 20px;
}

#console {
    width: 100%;
    max-width: 900px;
    height: 500px;
    background: #000;
    border: 1px solid #111;
    padding: 15px;
    overflow-y: auto;
    font-size: 12px;
}
</style>
</head>

<body>

<button id="backBtn" onclick="window.location.href='index.html'">
⬅ Volver
</button>

<div id="console">Cargando logs...</div>

<script>
async function loadLogs() {
    try {
        const res = await fetch("/logs");
        const data = await res.json();

        const consoleDiv = document.getElementById("console");

        consoleDiv.innerHTML = data.map(l => `> ${l}`).join("<br>");
        consoleDiv.scrollTop = consoleDiv.scrollHeight;

    } catch (err) {
        document.getElementById("console").innerHTML = "❌ Error cargando logs";
    }
}

// 🔁 actualizar cada 2s
setInterval(loadLogs, 2000);
loadLogs();
</script>

</body>
</html>
