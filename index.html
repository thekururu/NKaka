<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦Ø𝐓𝐈✦</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --glow: rgba(0, 242, 255, 0.6); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #010101; color: #fff; overflow-x: hidden; }

        /* --- NAVBAR --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 5%; position: fixed; width: 100%; top: 0; z-index: 1000;
            background: rgba(1, 1, 1, 0.8); backdrop-filter: blur(10px);
        }
        .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: 2px; }
        .links { display: flex; gap: 15px; }
        .links a { text-decoration: none; color: #777; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; }
        
        /* Ocultar texto en móvil para que no choque */
        @media (max-width: 600px) { .links span { display: none; } .links i { font-size: 1.2rem; } }

        /* --- HERO: ESFERA + TITULO DENTRO --- */
        .hero { 
            height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; 
            position: relative; overflow: hidden;
        }
        #sphereCanvas { position: absolute; z-index: 1; touch-action: none; }
        
        .hero-title {
            position: relative; z-index: 2; font-size: clamp(3rem, 15vw, 8rem);
            font-weight: 900; text-shadow: 0 0 40px var(--glow);
            pointer-events: none; /* Para poder tocar la esfera "detrás" */
            letter-spacing: -2px;
        }

        /* --- CONTENIDO ABAJO --- */
        .content { padding: 100px 20px; display: flex; flex-direction: column; align-items: center; gap: 40px; }
        
        .bubble {
            background: rgba(10, 10, 10, 0.9); border: 1px solid #1a1a1a;
            padding: 30px; border-radius: 35px; max-width: 600px; width: 95%;
            color: #888; font-size: 1.1rem; line-height: 1.6; text-align: center;
        }

        .btn {
            padding: 18px 50px; background: var(--accent); color: #000;
            text-decoration: none; font-weight: 900; border-radius: 100px;
            box-shadow: 0 0 30px var(--glow); transition: 0.3s; letter-spacing: 1px;
        }

        footer { padding: 60px; color: #333; font-size: 1.2rem; text-align: center; letter-spacing: 4px; }

        /* --- SOPORTE FLOTANTE --- */
        .support-btn {
            position: fixed; bottom: 20px; left: 20px; width: 55px; height: 55px;
            background: var(--accent); color: #000; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.3rem; cursor: pointer; z-index: 2000;
        }
        
        #modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); display: none; align-items: center; justify-content: center; z-index: 3000;
        }
        .modal-box { background: #050505; padding: 30px; border-radius: 25px; width: 90%; max-width: 350px; border: 1px solid #222; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #0f0f0f; border: 1px solid #222; color: #fff; border-radius: 10px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">✦Ø𝐓𝐈✦</div>
        <div class="links">
            <a href="#"><i class="ri-terminal-box-line"></i> <span>Comandos</span></a>
            <a href="#"><i class="ri-cpu-line"></i> <span>IA</span></a>
            <a href="#"><i class="ri-code-s-slash-line"></i> <span>Código</span></a>
        </div>
    </nav>

    <section class="hero">
        <canvas id="sphereCanvas"></canvas>
        <h1 class="hero-title">✦Ø𝐓𝐈✦</h1>
    </section>

    <section class="content">
        <div class="bubble"> (PONER DESC AQUÍ) </div>
        <a href="#" class="btn">INVITAR A DISCORD</a>
    </section>

    <footer>ᖴᎥᖇᗴᔕ丅ᑌᗝᔕ</footer>

    <div class="support-btn" onclick="openModal()">?</div>

    <div id="modal">
        <div class="modal-box">
            <h2 style="color:var(--accent); font-size: 1.2rem;">Soporte Técnico</h2>
            <input type="text" id="id" placeholder="Discord ID">
            <textarea id="msg" rows="3" placeholder="¿En qué ayudamos?"></textarea>
            <button class="btn" style="width:100%; padding:12px; font-size: 0.9rem;" onclick="closeModal()">ENVIAR</button>
            <p onclick="closeModal()" style="margin-top:15px; cursor:pointer; color:#444; text-align:center; font-size: 0.8rem;">Cerrar</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('sphereCanvas');
        const ctx = canvas.getContext('2d');
        let points = [];
        let mX = 0, mY = 0;
        let radius = window.innerWidth < 600 ? 180 : 320; // Más chica en móvil

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            radius = window.innerWidth < 600 ? 180 : 320;
            points = [];
            for(let i=0; i<150; i++) {
                let t = Math.acos(Math.random() * 2 - 1);
                let p = Math.random() * Math.PI * 2;
                points.push({x: radius * Math.sin(t) * Math.cos(p), y: radius * Math.sin(t) * Math.sin(p), z: radius * Math.cos(t)});
            }
        }

        function rotate(p, x, y) {
            let cx = Math.cos(x), sx = Math.sin(x), cy = Math.cos(y), sy = Math.sin(y);
            let py = p.y * cx - p.z * sx, pz = p.y * sx + p.z * cx;
            p.y = py; p.z = pz;
            let px = p.x * cy + p.z * sy;
            p.x = px; p.z = -p.x * sy + p.z * cy;
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let rX = (mY - canvas.height/2) * 0.00004, rY = (mX - canvas.width/2) * 0.00004;
            let proj = [];
            points.forEach(p => {
                rotate(p, rX + 0.002, rY + 0.002);
                let s = 500 / (500 - p.z);
                let x = p.x * s + canvas.width/2, y = p.y * s + canvas.height/2;
                proj.push({x, y});
                ctx.fillStyle = `rgba(0,242,255,${(p.z+radius)/(radius*2)})`;
                ctx.beginPath(); ctx.arc(x, y, (window.innerWidth < 600 ? 1 : 1.5) * s, 0, 7); ctx.fill();
            });
            ctx.lineWidth = 0.4;
            for(let i=0; i<proj.length; i++) {
                for(let j=i+1; j<proj.length; j++) {
                    let d = Math.hypot(proj[i].x - proj[j].x, proj[i].y - proj[j].y);
                    if(d < (window.innerWidth < 600 ? 50 : 80)) {
                        ctx.strokeStyle = `rgba(0,242,255,${0.15 * (1-d/80)})`;
                        ctx.beginPath(); ctx.moveTo(proj[i].x, proj[i].y); ctx.lineTo(proj[j].x, proj[j].y); ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }

        window.onmousemove = e => { mX = e.clientX; mY = e.clientY; };
        window.ontouchmove = e => { mX = e.touches[0].clientX; mY = e.touches[0].clientY; };
        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        window.onresize = init;
        init(); draw();
    </script>
</body>
</html>
