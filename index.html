<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦Ø𝐓𝐈✦ | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --bg-card: rgba(15, 15, 15, 0.7);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --accent: #00f2ff; 
            --accent-glow: rgba(0, 242, 255, 0.4);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow: hidden; height: 100vh; }

        /* --- BACKGROUND & CANVAS --- */
        #sphereCanvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            cursor: move;
        }

        /* --- NAV BAR --- */
        nav {
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--accent); }
        .logo-text { font-size: 1.3rem; font-weight: 800; color: #fff; letter-spacing: 1px; }

        .nav-links { display: flex; list-style: none; gap: 20px; }
        .nav-links a { text-decoration: none; color: var(--text-dim); transition: var(--transition); font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }
        .nav-links a:hover { color: var(--accent); transform: translateY(-2px); }

        /* --- HERO --- */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; position: relative; z-index: 10;
        }

        .hero h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 0 0 30px var(--accent-glow);
            pointer-events: none;
        }

        /* --- DESCRIPCIÓN REDISEÑADA (MÁS GOAT) --- */
        .desc-container {
            margin-top: 150px; /* Bajada la descripción */
            max-width: 600px;
            padding: 20px;
            position: relative;
        }

        .desc-text {
            color: var(--text-dim);
            font-size: 1.1rem;
            line-height: 1.6;
            font-style: italic;
            opacity: 0.8;
        }

        .btn-invite {
            margin-top: 30px;
            padding: 12px 30px;
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: var(--transition);
        }

        .btn-invite:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* --- SOPORTE FLOTANTE --- */
        .support-trigger {
            position: fixed; bottom: 30px; left: 30px;
            width: 60px; height: 60px;
            background: var(--accent);
            color: #000;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; font-weight: 900;
            cursor: pointer; z-index: 2000;
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.3);
            transition: var(--transition);
        }
        .support-trigger:hover { transform: scale(1.1) rotate(15deg); }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 3000;
        }

        .modal-content {
            background: #111; border: 1px solid #333;
            padding: 30px; border-radius: 20px; width: 90%; max-width: 400px;
            position: relative; animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .modal-content h2 { margin-bottom: 20px; color: var(--accent); }
        .modal-content input, .modal-content textarea {
            width: 100%; background: #1a1a1a; border: 1px solid #333;
            padding: 12px; color: #fff; margin-bottom: 15px; border-radius: 10px;
        }

        .close-modal { position: absolute; top: 15px; right: 15px; cursor: pointer; color: #555; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container">
            <img src="https://media.discordapp.net/attachments/1387449616412315741/1486186182336577719/469_sin_titulo_20260203174008.png?ex=69d11c7d&is=69cfcafd&hm=13fe8af029c5aa658cd01b8e68e2b277d751f71d8d93c437ca719db202484c21&=&format=webp&quality=lossless&width=578&height=578" class="logo-img">
            <span class="logo-text">✦Ø𝐓𝐈✦</span>
        </div>
        <ul class="nav-links">
            <li><a href="coms.html"><i class="ri-terminal-line"></i> Comandos</a></li>
            <li><a href="ia.html"><i class="ri-brain-line"></i> IA</a></li>
            <li><a href="#"><i class="ri-code-s-slash-line"></i> Código</a></li>
        </ul>
    </nav>

    <section class="hero">
        <canvas id="sphereCanvas"></canvas>
        <h1>✦Ø𝐓𝐈✦</h1>
        
        <div class="desc-container">
            <p class="desc-text">
                "Ø𝐓𝐈 redefine la gestión de comunidades. Un ecosistema minimalista, potente y diseñado para quienes buscan la excelencia en Discord."
            </p>
            <a href="AQUI_TU_LINK_DE_INVITE" class="btn-invite">Invitar al Bot</a>
        </div>
    </section>

    <div class="support-trigger" onclick="toggleModal()">?</div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <i class="ri-close-line close-modal" onclick="toggleModal()"></i>
            <h2>Centro de Ayuda</h2>
            <input type="text" id="userId" placeholder="Tu Discord ID">
            <textarea id="userMsg" rows="4" placeholder="¿Qué necesitas, crack?"></textarea>
            <button class="btn-invite" style="width: 100%; border-radius: 10px;" onclick="sendWebhook()">Enviar Reporte</button>
        </div>
    </div>

    <script>
        // --- ESFERA INTERACTIVA (AHORA SE MUEVE CON EL MOUSE) ---
        const canvas = document.getElementById('sphereCanvas');
        const ctx = canvas.getContext('2d');
        let points = [];
        const numPoints = 130;
        let mouseX = 0, mouseY = 0;
        let autoRotateX = 0.002, autoRotateY = 0.002;

        function init() {
            canvas.width = 600; canvas.height = 600;
            for(let i=0; i<numPoints; i++) {
                let theta = Math.acos(Math.random() * 2 - 1);
                let phi = Math.random() * Math.PI * 2;
                points.push({
                    x: 200 * Math.sin(theta) * Math.cos(phi),
                    y: 200 * Math.sin(theta) * Math.sin(phi),
                    z: 200 * Math.cos(theta)
                });
            }
        }

        function rotate(p, x, y) {
            let cosX = Math.cos(x), sinX = Math.sin(x);
            let cosY = Math.cos(y), sinY = Math.sin(y);
            let py = p.y * cosX - p.z * sinX;
            let pz = p.y * sinX + p.z * cosX;
            p.y = py; p.z = pz;
            let px = p.x * cosY + p.z * sinY;
            pz = -p.x * sinY + p.z * cosY;
            p.x = px; p.z = pz;
        }

        function draw() {
            ctx.clearRect(0, 0, 600, 600);
            // Si mueves el mouse, la rotación sigue al mouse. Si no, rota solo.
            let rX = (mouseY - 300) * 0.0001 || autoRotateX;
            let rY = (mouseX - 300) * 0.0001 || autoRotateY;

            points.forEach(p => {
                rotate(p, rX, rY);
                let scale = 400 / (400 - p.z);
                let x2d = p.x * scale + 300;
                let y2d = p.y * scale + 300;
                ctx.fillStyle = `rgba(0, 242, 255, ${(p.z + 200)/400})`;
                ctx.beginPath();
                ctx.arc(x2d, y2d, Math.max(1, 2 * scale), 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('mousemove', e => {
            mouseX = e.clientX - window.innerWidth/2 + 300;
            mouseY = e.clientY - window.innerHeight/2 + 300;
        });

        // --- MODAL LOGIC ---
        function toggleModal() {
            const m = document.getElementById('modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        // --- WEBHOOK ---
        function sendWebhook() {
            const id = document.getElementById('userId').value;
            const msg = document.getElementById('userMsg').value;
            if(!id || !msg) return alert("Rellena los datos!");
            
            // Aquí pones tu Webhook de Discord
            const url = "TU_WEBHOOK_AQUI"; 
            
            fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    embeds: [{
                        title: "Nuevo Soporte",
                        description: `**ID:** ${id}\n**Msg:** ${msg}`,
                        color: 65535
                    }]
                })
            }).then(() => {
                alert("Enviado con éxito!");
                toggleModal();
            });
        }

        init(); draw();
    </script>
</body>
</html>
