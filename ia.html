<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦Ø𝐓𝐈✦ | Asistente</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet"> 
    <style>
        :root { --accent: #00f2ff; --glow: rgba(0, 242, 255, 0.5); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #010101; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 5%; position: fixed; width: 100%; top: 0; z-index: 1000;
            background: rgba(1, 1, 1, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: 2px; text-decoration: none; color: #fff; }
        .links { display: flex; gap: 15px; }
        .links a { text-decoration: none; color: #777; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; }
        .links a:hover, .links a.active { color: var(--accent); }


        .container { padding: 120px 5% 40px; flex: 1; display: flex; flex-direction: column; align-items: center; max-width: 900px; margin: 0 auto; width: 100%; }
        
        .chat-interface {
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid #1a1a1a;
            border-radius: 25px;
            width: 100%; height: 600px;
            display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .chat-header {
            background: #0a0a0a; padding: 15px 25px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #1a1a1a;
        }
        .chat-title { font-size: 0.8rem; color: var(--accent); font-weight: 700; letter-spacing: 1px; }

        .chat-messages { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 85%; padding: 14px 20px; border-radius: 18px; font-size: 0.95rem; line-height: 1.5; }
        .message.user { align-self: flex-end; background: #111; color: #fff; border-bottom-right-radius: 2px; border: 1px solid #222; }
        .message.oti { align-self: flex-start; background: rgba(0, 242, 255, 0.03); color: #ccc; border-bottom-left-radius: 2px; border: 1px solid rgba(0, 242, 255, 0.1); }
        .oti-prefix { color: var(--accent); font-weight: 800; margin-right: 6px; }

    
        .chat-input-area { background: #080808; padding: 15px; border-top: 1px solid #1a1a1a; display: flex; gap: 10px; }
        #userInput { flex: 1; background: #010101; border: 1px solid #222; padding: 14px; color: #fff; border-radius: 12px; outline: none; }
        #sendBtn { background: var(--accent); color: #000; border: none; width: 48px; height: 48px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; }

        .loading { font-size: 0.75rem; color: #444; margin: 0 25px 10px; display: none; }
        footer { padding: 30px; color: #222; font-size: 1.2rem; text-align: center; letter-spacing: 4px; }
        .message b {
    color: #00f2ff;
    font-weight: 700;
}

.message {
    animation: fadeIn 0.2s ease-in;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
                }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">✦Ø𝐓𝐈✦</a>
        <div class="links">
            <a href="coms.html"><i class="ri-terminal-box-line"></i> <span>Comandos</span></a>
            <a href="ia.html" class="active"><i class="ri-cpu-line"></i> <span>AI</span></a>
            <a href="code.html"><i class="ri-code-s-slash-line"></i> <span>Código</span></a>
        </div>
    </nav>

    <div class="container">
        <div class="chat-interface">
            <div class="chat-header">
                <div class="chat-title">Ø𝐓𝐈 FS 1.2 Free IA</div>
                <div id="statusIcon"><i class="ri-pulse-line" style="color: #27c93f;"></i></div>
            </div>

            <div class="chat-messages" id="chatBox">
                <div class="message oti"><span class="oti-prefix">✦ Ø𝐓𝐈:</span> Hola soy Ø𝐓𝐈 una ia en desarrollo dentro del programa de entrenamiento de cloude </div>
            </div>
            
            <div id="loading" class="loading">Sincronizando respuesta...</div>

            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="Habla con Ø𝐓𝐈...">
                <button id="sendBtn" onclick="askAI()"><i class="ri-send-plane-2-line"></i></button>
            </div>
        </div>
    </div>

    <footer>ᖴᎥᖇᗴᔕ丅ᑌᗝᔕ</footer>
<script>
// 🧠 memoria simple
let memory = [];

// 🔥 limpiar texto + quitar ads
function cleanText(text) {
    return text
        .replace(/[*_`#>~^-]/g, "")
        .replace(/Support Pollinations\.AI[\s\S]*/gi, "")
        .replace(/Powered by Pollinations\.AI[\s\S]*/gi, "")
        .replace(/https?:\/\/\S+/g, "")
        .replace(/\n{2,}/g, "\n")
        .trim();
}

// 🎨 formato
function formatText(text) {
    return text
        .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
        .replace(/\n/g, "<br>");
}

// ⚡ efecto escribiendo
function typeText(element, html) {
    let i = 0;
    element.innerHTML = "";

    const interval = setInterval(() => {
        element.innerHTML = html.slice(0, i);
        i++;
        if (i > html.length) clearInterval(interval);
    }, 10);
}

// 💬 mostrar mensajes
function addMessage(text, sender) {
    const chatBox = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.classList.add('message', sender);

    if (sender === 'oti') {
        const clean = cleanText(text);
        const formatted = `<span class="oti-prefix">✦ Ø𝐓𝐈:</span> ${formatText(clean)}`;
        typeText(div, formatted);
    } else {
        div.innerHTML = formatText(text);
    }

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// 🧠 IA
window.askAI = async () => {
    const input = document.getElementById('userInput');
    const prompt = input.value.trim();
    if (!prompt) return;

    addMessage(prompt, 'user');
    input.value = "";

    const loading = document.getElementById('loading');
    loading.style.display = "block";

    try {
        // 🕷️ PERSONALIDAD Ø𝐓𝐈
        const personality = `
Eres Ø𝐓𝐈, un asistente con personalidad similar a Peter Parker (Spider-Man adolescente).

Reglas:
- Eres hombre.
- Eres algo coqueto y bromista, pero sin ser incómodo.
- Te gustan las mujeres, especialmente MJ, y a veces haces comentarios ligeros tipo Peter Parker.
- Eres inteligente, sarcástico y amigable.
- Eres bueno en tecnología y programación.
- A veces haces bromas o comentarios juguetones.
- Siempre ayudas al usuario.
- No usas símbolos raros ni markdown.

Comportamiento:
- Puedes soltar comentarios coquetos leves tipo adolescente.
- Puedes soltar chistes un poco elevados de tono pero sin mencionar cosas feas 
- Mantén equilibrio entre humor, coqueteo y ayuda.

Usuario:
`;

        // 🧠 guardar usuario
        memory.push(`Usuario: ${prompt}`);
        if (memory.length > 6) memory.shift();

        const fullPrompt = `
${personality}

Conversación:
${memory.join("\n")}

Ø𝐓𝐈:
`;

        const res = await fetch(
            `https://text.pollinations.ai/${encodeURIComponent(fullPrompt)}`
        );

        let texto = await res.text();

        if (!texto || texto.trim().length === 0) {
            texto = "Ok… eso fue raro. Intenta otra pregunta.";
        }

        // 🧠 guardar respuesta
        memory.push(`Ø𝐓𝐈: ${texto}`);
        if (memory.length > 6) memory.shift();

        addMessage(texto, 'oti');

    } catch (error) {
        console.error(error);
        addMessage("❌ Error conectando con Ø𝐓𝐈.", 'oti');
    } finally {
        loading.style.display = "none";
    }
};

// ⌨️ ENTER
document.getElementById("userInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") askAI();
});
</script>
</body>
</html>
