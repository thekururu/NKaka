name: Desplegar OTI con IA
on:
  push:
    branches:
      - main  

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inyectar Secreto IA
        run: |
          # Reemplaza el marcador en el HTML con el valor de tu secreto 'IA'
          sed -i "s/REPLACE_WITH_IA_SECRET/${{ secrets.IA }}/g" ia.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
